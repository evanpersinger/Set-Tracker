<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Set Tracker</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    background: #111;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: max(24px, env(safe-area-inset-top)) 20px max(24px, env(safe-area-inset-bottom));
    user-select: none;
  }

  .top, .mid {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  /* Timer */
  #timer {
    font-size: 24vw;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    transition: color .2s;
  }
  #timer.resting { color: #4ade80; }
  #timer.done { color: #888; }

  #status { font-size: 16px; color: #888; height: 20px; }

  /* Mode toggle */
  #modes {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    width: 100%;
    max-width: 360px;
  }
  .mode {
    flex: 1;
    border: 2px solid #333;
    border-radius: 12px;
    background: transparent;
    color: #888;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 6px;
    cursor: pointer;
  }
  .mode.active {
    border-color: #4ade80;
    color: #fff;
    background: rgba(22,128,60,.25);
  }

  /* Set-count picker (Option 2 only) */
  #counts {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 16px;
  }
  #counts.hidden { display: none; }
  .count {
    width: 54px;
    height: 46px;
    border: 2px solid #333;
    border-radius: 12px;
    background: transparent;
    color: #888;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
  }
  .count.active {
    border-color: #4ade80;
    color: #fff;
    background: rgba(22,128,60,.25);
  }

  /* Set buttons */
  #sets {
    display: grid;
    grid-template-columns: 1fr 1fr;
    justify-items: center;
    gap: 18px;
    width: 100%;
    max-width: 360px;
  }
  .set {
    border: none;
    border-radius: 50%;
    aspect-ratio: 1 / 1;
    width: 100%;
    max-width: 140px;
    background: #262626;
    color: #fff;
    font-size: 22px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 6px 0 #000, 0 8px 12px rgba(0,0,0,.5);
    transition: transform .05s, background .2s, box-shadow .05s;
  }
  .set:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #000, 0 3px 6px rgba(0,0,0,.5);
  }
  .set.done {
    background: #16803c;
    color: #dcfce7;
    box-shadow: 0 6px 0 #0b4a22, 0 8px 12px rgba(0,0,0,.5);
  }

  #reset {
    border: none;
    border-radius: 16px;
    background: transparent;
    color: #888;
    border: 2px solid #333;
    font-size: 18px;
    font-weight: 600;
    padding: 16px 0;
    width: 100%;
    max-width: 420px;
    cursor: pointer;
  }
  #reset:active { background: #1a1a1a; }
</style>

<div class="top">
  <div id="timer">2:00</div>
  <div id="status"></div>
  <div id="modes">
    <button class="mode" data-mode="1">2 min · 6 sets</button>
    <button class="mode" data-mode="2">3 min · 2-4 sets</button>
  </div>
</div>

<div class="mid">
  <div id="counts" class="hidden">
    <button class="count" data-count="2">2</button>
    <button class="count" data-count="3">3</button>
    <button class="count" data-count="4">4</button>
  </div>
  <div id="sets"></div>
</div>

<button id="reset">Reset</button>

<script>
  // Two modes: Option 1 = 2 min rest / 6 sets (fixed),
  //            Option 2 = 3 min rest / pick 2-4 sets.
  let mode = 1;          // 1 or 2
  let opt2Count = 4;     // remembered set count for Option 2
  let restSeconds = 120; // current rest length in seconds
  let setCount = 6;      // current number of set buttons

  const timerEl   = document.getElementById("timer");
  const statusEl  = document.getElementById("status");
  const setsEl    = document.getElementById("sets");
  const countsEl  = document.getElementById("counts");
  const resetBtn  = document.getElementById("reset");
  const modeBtns  = document.querySelectorAll(".mode");
  const countBtns = document.querySelectorAll(".count");

  let intervalId = null;
  let endTime = null;
  let buttons = [];

  function format(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return m + ":" + String(s).padStart(2, "0");
  }

  // (Re)build the set buttons for the current setCount
  function buildSets() {
    setsEl.innerHTML = "";
    buttons = [];
    for (let i = 1; i <= setCount; i++) {
      const btn = document.createElement("button");
      btn.className = "set";
      btn.textContent = "Set " + i;
      btn.addEventListener("click", () => completeSet(btn));
      buttons.push(btn);
      setsEl.appendChild(btn);
    }
  }

  // Switch between Option 1 and Option 2
  function selectMode(m) {
    mode = m;
    if (m === 1) {
      restSeconds = 120;
      setCount = 6;
      countsEl.classList.add("hidden");
    } else {
      restSeconds = 180;
      setCount = opt2Count;
      countsEl.classList.remove("hidden");
    }
    modeBtns.forEach(b => b.classList.toggle("active", Number(b.dataset.mode) === m));
    countBtns.forEach(b => b.classList.toggle("active", Number(b.dataset.count) === opt2Count));
    buildSets();
    reset();
  }

  // Pick how many sets in Option 2 (2, 3, or 4)
  function selectCount(c) {
    opt2Count = c;
    setCount = c;
    countBtns.forEach(b => b.classList.toggle("active", Number(b.dataset.count) === c));
    buildSets();
    reset();
  }

  function completeSet(btn) {
    btn.classList.add("done");     // mark this set finished
    startRest();
  }

  function startRest() {
    if (intervalId) clearInterval(intervalId);

    endTime = Date.now() + restSeconds * 1000;   // when rest should end
    timerEl.className = "resting";
    statusEl.textContent = "Resting...";
    timerEl.textContent = format(restSeconds);

    intervalId = setInterval(tick, 250);
  }

  // Reads the real clock, so it stays correct even if the tab was frozen
  function tick() {
    if (endTime === null) return;
    const remaining = Math.round((endTime - Date.now()) / 1000);
    if (remaining <= 0) {
      finishRest();
    } else {
      timerEl.textContent = format(remaining);
    }
  }

  function finishRest() {
    if (intervalId) clearInterval(intervalId);
    intervalId = null;
    endTime = null;
    timerEl.textContent = "0:00";
    timerEl.className = "done";
    statusEl.textContent = "";
  }

  function reset() {
    if (intervalId) clearInterval(intervalId);
    intervalId = null;
    endTime = null;
    buttons.forEach(b => b.classList.remove("done"));
    timerEl.className = "";
    timerEl.textContent = format(restSeconds);
    statusEl.textContent = "";
  }

  // Re-sync the moment you return to the tab
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) tick();
  });

  modeBtns.forEach(b => b.addEventListener("click", () => selectMode(Number(b.dataset.mode))));
  countBtns.forEach(b => b.addEventListener("click", () => selectCount(Number(b.dataset.count))));
  resetBtn.addEventListener("click", reset);

  selectMode(1);   // start on Option 1
</script>
